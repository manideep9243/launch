<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25 Years of Excellence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background 2s ease;
            position: relative;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* Launch Screen - Gray & Black Theme */
        #launch-screen {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            color: #e0e0e0;
            text-align: center;
        }
       
        .main-title {
            font-size: clamp(2.8rem, 8vw, 5.8rem);
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px #ffd700;
            animation: titleGlow 4s ease-in-out infinite alternate;
        }
       
        .subtitle {
            font-size: clamp(1.1rem, 3vw, 1.9rem);
            opacity: 0.9;
            letter-spacing: 0.45em;
            margin-bottom: 4.5rem;
            color: #bbbbbb;
        }
       
        .launch-btn {
            padding: 28px 80px;
            font-size: clamp(1.9rem, 4.8vw, 3.1rem);
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: transparent;
            color: #ffd700;
            border: 5px solid #ffd700;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.7);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .launch-btn:hover {
            background: #ffd700;
            color: #1a1a1a;
            transform: scale(1.12) translateY(-8px);
        }

        /* White Background Screens */
        #countdown-screen, #logo-screen {
            background: #ffffff;
            color: #1a1a1a;
        }

        #countdown-number {
            font-size: clamp(7rem, 28vw, 20rem);
            font-weight: 900;
            color: #1a1a1a;
            text-shadow: 0 0 40px rgba(26,26,26,0.3);
            animation: countPop 0.9s ease forwards;
        }
       
        .countdown-label {
            font-size: clamp(1.5rem, 4.5vw, 2.6rem);
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #1a1a1a;
            opacity: 0.9;
        }

        #celebration-logo {
            max-width: 88vw;
            max-height: 68vh;
            filter: drop-shadow(0 0 90px rgba(255, 215, 0, 0.9));
            animation: logoReveal 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
       
        .celebration-text {
            font-size: clamp(2.2rem, 7vw, 4.5rem);
            font-weight: 800;
            letter-spacing: 14px;
            color: #1a1a1a;
            margin-top: 2.5rem;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 30px #ffd700; }
            to   { text-shadow: 0 0 70px #ffd700, 0 0 120px rgba(255,215,0,0.7); }
        }
       
        @keyframes countPop {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
       
        @keyframes logoReveal {
            0% { opacity: 0; transform: scale(0.1) rotate(-15deg); }
            50% { transform: scale(1.15) rotate(8deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="content">

        <!-- Launch Screen - Gray & Black -->
        <div id="launch-screen" class="screen active">
            <div style="text-align:center;">
                <h1 class="main-title">25 YEARS</h1>
                <p class="subtitle">EXCELLENCE • INNOVATION • LEGACY</p>
                <button id="launch-button" class="launch-btn">
                    Launch 25 Years Logo
                </button>
            </div>
        </div>

        <!-- Countdown Screen -->
        <div id="countdown-screen" class="screen">
            <div style="text-align:center;">
                <div id="countdown-number">10</div>
                <p class="countdown-label">To Reveal New Logo</p>
            </div>
        </div>

        <!-- Logo Screen with Balloon Shower -->
        <div id="logo-screen" class="screen">
            <div style="text-align:center;">
                <img id="celebration-logo" src="image.png" alt="25 Years College Celebration Logo">
                <h2 class="celebration-text">25 Year's of Excellence</h2>
            </div>
        </div>

    </div>

    <script>

        const ctx = canvas.getContext('2d');
        let w = window.innerWidth;
        let h = window.innerHeight;

            h = window.innerHeight;

        let balloons = [];
        let isWhiteMode = false;

        // Balloon Shower Class
        class Balloon {
            constructor() {
                this.x = Math.random() * w;
                this.y = -50 - Math.random() * 100;
                this.size = Math.random() * 28 + 22;
                this.speed = Math.random() * 3 + 2.5;
                this.color = ['#ff4d4d', '#4dff4d', '#4d4dff', '#ffd700', '#ff80ff', '#80ffff'][Math.floor(Math.random()*6)];
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.08;
                this.swing = Math.random() * 0.03 + 0.015;
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.y += this.speed;
                this.angle += this.spin;
                this.phase += this.swing;
                this.x += Math.sin(this.phase) * 2.5;   // gentle swinging
                if (this.y > h + 100) this.y = -100;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.fillText('🎈', 0, 0);
                ctx.restore();
            }
        }

        function initBackground() {
            particles = [];
            for (let i = 0; i < 55; i++) {
                particles.push(new CollegeParticle());
            }
        }

        function startBalloonShower(count = 35) {
            balloons = [];
            for (let i = 0; i < count; i++) {
                balloons.push(new Balloon());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);

            // College elements
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // Balloon shower
            for (let i = balloons.length - 1; i >= 0; i--) {
                balloons[i].update();
                balloons[i].draw();
            }

            requestAnimationFrame(animate);
        }

        function startCountdown() {
            let count = 10;
            const numEl = document.getElementById('countdown-number');
            numEl.textContent = count;

            const interval = setInterval(() => {
                count--;
                numEl.style.animation = 'none';
                void numEl.offsetWidth;
                numEl.style.animation = 'countPop 0.9s ease forwards';
                numEl.textContent = count;

                if (count <= 0) {
                    clearInterval(interval);
                    setTimeout(revealLogo, 800);
                }
            }, 950);
        }

        function revealLogo() {
            document.getElementById('countdown-screen').classList.remove('active');
            setTimeout(() => {
                document.getElementById('logo-screen').classList.add('active');
                startBalloonShower(45);   // Start balloon shower when logo appears
            }, 500);
        }

        // Launch handler
        document.getElementById('launch-button').addEventListener('click', () => {
            const launchScreen = document.getElementById('launch-screen');
            launchScreen.style.opacity = '0';

            setTimeout(() => {
                launchScreen.classList.remove('active');
                document.body.style.background = '#ffffff';
                isWhiteMode = true;
                document.getElementById('countdown-screen').classList.add('active');
                startCountdown();
            }, 900);
        });

        window.onload = () => {
            initBackground();
            animate();
            console.log('%c🎓 25 Years Celebration Ready - Gray Launch + White Reveal + Balloon Shower', 'color:#1a1a1a; font-size:16px;');
        };
    </script>
