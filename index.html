<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25 Years of Excellence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Space Grotesk', 'Poppins', system-ui, -apple-system, sans-serif;
            transition: background 2s ease;
            position: relative;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* ========== PARALLAX STARS BACKGROUND ========== */
        #launch-screen {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
            position: relative;
        }

        .stars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .star.small {
            width: 1px;
            height: 1px;
            animation: animStar 50s linear infinite;
        }

        .star.medium {
            width: 2px;
            height: 2px;
            animation: animStar 100s linear infinite;
        }

        .star.big {
            width: 3px;
            height: 3px;
            animation: animStar 150s linear infinite;
        }

        @keyframes animStar {
            from { transform: translateY(0); }
            to { transform: translateY(-2000px); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ========== LAUNCH SCREEN CONTENT ========== */
        .launch-content {
            position: relative;
            z-index: 20;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
       
        .main-title {
            font-size: clamp(2.8rem, 10vw, 7rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 10px 30px rgba(255, 215, 0, 0.3));
            animation: titleGlow 4s ease-in-out infinite alternate, float 3s ease-in-out infinite;
            font-family: 'Syne', 'Space Grotesk', sans-serif;
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #a0c4ff;
            text-shadow: 0 2px 20px rgba(160, 196, 255, 0.2);
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 1rem;
        }

        .launch-btn {
            padding: 18px 60px;
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #090A0F;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5), 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .launch-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.6s ease;
        }
        
        .launch-btn:hover::before {
            left: 100%;
        }
       
        .launch-btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.7), 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .launch-btn:active {
            transform: scale(0.98);
        }

        /* Premium Countdown Screen */
        #countdown-screen {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e8f5 100%);
            color: #1a1a1a;
        }
        
        #logo-screen {
            background: #ffffff;
            color: #ffffff;
        }

        .countdown-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            position: relative;
        }

        #countdown-number {
            font-size: clamp(7rem, 28vw, 20rem);
            font-weight: 900;
            background: linear-gradient(135deg, #0f3460, #16213e, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: countPop 0.9s ease forwards;
            line-height: 1;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.2));
            font-family: 'Syne', sans-serif;
        }
       
        .countdown-label {
            font-size: clamp(1.5rem, 4.5vw, 2.6rem);
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #0f3460;
            font-weight: 700;
            opacity: 0.95;
            animation: labelFade 1s ease-in-out;
            text-align: center;
            max-width: 90vw;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            font-family: 'Space Grotesk', sans-serif;
        }

        .countdown-sublabel {
            font-size: clamp(0.9rem, 2vw, 1.4rem);
            color: #ff6b6b;
            font-weight: 500;
            letter-spacing: 1px;
            animation: labelFade 1s ease-in-out;
            text-align: center;
            display: none;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            height: 100%;
            justify-content: center;
            position: relative;
        }

        .logo-viewer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            width: 95vw;
            height: 85vh;
            max-height: 90vh;
        }

        #celebration-logo, #logo-3d-container {
            max-width: 50vw;
            max-height: 55vh;
            animation: logoReveal 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        #logo-3d-container {
            width: 90vw;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: none;
            background: transparent;
            position: relative;
            overflow: hidden;
            border: none;
            animation: none;
        }

        #logo-3d-canvas {
            width: 100%;
            height: 100%;
        }

        .celebration-text {
            display: none;
        }

        .controls-panel {
            display: none;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-label {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ffd700;
        }

        input:checked + .slider:before {
            transform: translateX(36px);
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 10px 20px rgba(255, 215, 0, 0.3)); }
            to   { filter: drop-shadow(0 10px 40px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 60px rgba(255,215,0,0.4)); }
        }
       
        @keyframes countPop {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
       
        @keyframes logoReveal {
            0% { opacity: 0; transform: scale(0.1) rotate(-15deg); }
            50% { transform: scale(1.15) rotate(8deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        @keyframes labelFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(40px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 20px 80px rgba(255, 215, 0, 0.4), inset 0 0 40px rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 20px 100px rgba(255, 215, 0, 0.6), inset 0 0 60px rgba(255, 255, 255, 0.15); }
        }

        .visible {
            display: block;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .logo-viewer {
                flex-direction: column;
            }

            #celebration-logo, #logo-3d-container {
                max-width: 80vw;
                max-height: 50vh;
            }

            #logo-3d-container {
                width: 80vw;
                height: 50vh;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="content">

        <!-- Launch Screen - Parallax Stars -->
        <div id="launch-screen" class="screen active">
            <div class="stars-layer" id="stars-container"></div>
            <div class="launch-content">
                <h1 class="main-title">25 YEARS</h1>
                <p class="subtitle">EXCELLENCE • INNOVATION • LEGACY</p>
                <button id="launch-button" class="launch-btn">
                    Launch Celebration
                </button>
            </div>
        </div>

        <!-- Countdown Screen -->
        <div id="countdown-screen" class="screen">
            <div class="countdown-container">
                <div id="countdown-number">10</div>
                <p class="countdown-label" id="countdown-label">TO REVEAL NEW LOGO</p>
                <p class="countdown-sublabel" id="countdown-sublabel"></p>
            </div>
        </div>

        <!-- Logo Screen with 3D Display -->
        <div id="logo-screen" class="screen">
            <div class="logo-container">
                <div class="logo-viewer">
                    <div id="logo-3d-container">
                        <canvas id="logo-3d-canvas"></canvas>
                    </div>
                </div>
                <h2 class="celebration-text">25 Years of Excellence</h2>
            </div>
            
            <div class="controls-panel">
                <div style="text-align: center; color: #1a1a1a; font-weight: 600; letter-spacing: 1px;">
                    ✨ Interactive 3D Experience ✨
                </div>
            </div>
        </div>

    </div>

    <script>
        // ========== PARALLAX STARS BACKGROUND ==========
        function initParallaxStars() {
            const starsContainer = document.getElementById('stars-container');
            if (!starsContainer) return;

            // Generate stars using box-shadow for performance
            const generateStarsShadow = (count) => {
                let shadows = [];
                for (let i = 0; i < count; i++) {
                    const x = Math.floor(Math.random() * 2000);
                    const y = Math.floor(Math.random() * 2000);
                    shadows.push(`${x}px ${y}px #FFF`);
                }
                return shadows.join(', ');
            };

            const sizes = ['small', 'medium', 'big'];
            const counts = [700, 200, 100];
            const durations = [50, 100, 150];

            sizes.forEach((size, idx) => {
                const div = document.createElement('div');
                div.className = `star ${size}`;
                
                const shadowsSmall = generateStarsShadow(counts[idx]);
                const style = document.createElement('style');
                style.textContent = `
                    .star.${size} {
                        box-shadow: ${shadowsSmall};
                        animation-duration: ${durations[idx]}s;
                    }
                    .star.${size}::before {
                        box-shadow: ${shadowsSmall};
                    }
                `;
                document.head.appendChild(style);
                
                div.innerHTML = `<div style="box-shadow: ${shadowsSmall}; position: absolute; top: 2000px;"></div>`;
                starsContainer.appendChild(div);
            });
        }

        // ========== LOGO DISPLAY ==========
        function init3D() {
            const container = document.getElementById('logo-3d-container');
            if (!container) return;

            container.innerHTML = '';
            const img = document.createElement('img');
            img.src = 'image.png';
            img.alt = 'College Logo';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'contain';
            img.style.animation = 'float 3s ease-in-out infinite';
            
            container.appendChild(img);
        }

        // ========== CANVAS BACKGROUND ANIMATION ==========
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w = window.innerWidth;
        let h = window.innerHeight;

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }
        window.addEventListener('resize', resize);
        resize();

        let balloons = [];
        let particles = [];
        let isWhiteMode = false;

        // Particle system for background
        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.color = ['#ffd700', '#00d4ff', '#ff00ff'][Math.floor(Math.random() * 3)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.opacity *= 0.995;

                if (this.x < 0) this.x = w;
                if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h;
                if (this.y > h) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.restore();
            }
        }

        // Balloon Shower Class
        class Balloon {
            constructor() {
                this.x = Math.random() * w;
                this.y = -50 - Math.random() * 100;
                this.size = Math.random() * 28 + 22;
                this.speed = Math.random() * 3 + 2.5;
                this.color = ['#ff4d4d', '#4dff4d', '#4d4dff', '#ffd700', '#ff80ff', '#80ffff'][Math.floor(Math.random()*6)];
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.08;
                this.swing = Math.random() * 0.03 + 0.015;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speed;
                this.angle += this.spin;
                this.phase += this.swing;
                this.x += Math.sin(this.phase) * 2.5;
                if (this.y > h + 100) this.y = -100;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.fillText('🎈', 0, 0);
                ctx.restore();
            }
        }

        function startBalloonShower(count = 50) {
            balloons = [];
            for (let i = 0; i < count; i++) {
                balloons.push(new Balloon());
            }
        }

        function initParticles(count = 100) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, w, h);

            // Draw background gradient for dark mode on logo screen
            if (isWhiteMode) {
                const gradient = ctx.createLinearGradient(0, 0, w, h);
                gradient.addColorStop(0, 'rgba(15, 52, 96, 0.1)');
                gradient.addColorStop(1, 'rgba(26, 26, 46, 0.1)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);
            }

            // Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].opacity < 0.01) {
                    particles.splice(i, 1);
                }
            }

            // Draw balloons
            for (let i = balloons.length - 1; i >= 0; i--) {
                balloons[i].update();
                balloons[i].draw();
            }

            requestAnimationFrame(animateCanvas);
        }

        // ========== COUNTDOWN LABELS ==========
        const countdownLabels = {
            // 10: { label: 'TO REVEAL NEW LOGO', sublabel: '' },
            // 9: { label: 'ALMOST THERE', sublabel: '' },
            // 8: { label: 'GETTING CLOSE', sublabel: '' },
            // 7: { label: 'STAND BY', sublabel: '' },
            // 6: { label: 'PREPARE YOURSELF', sublabel: '' },
            5: { label: 'A LEGACY BEGINS', sublabel: '' },
            4: { label: 'YEARS OF DEDICATION', sublabel: '' },
            3: { label: 'EXCELLENCE IN ACTION', sublabel: '' },
            2: { label: 'INNOVATION & GROWTH', sublabel: '' },
            1: { label: 'CELEBRATING 25 YEARS', sublabel: '' }
        };

        function startCountdown() {
            let count = 5;
            const numEl = document.getElementById('countdown-number');
            const labelEl = document.getElementById('countdown-label');
            const sublabelEl = document.getElementById('countdown-sublabel');

            numEl.textContent = count;
            const info = countdownLabels[count];
            labelEl.textContent = info.label;
            sublabelEl.textContent = info.sublabel;

            const interval = setInterval(() => {
                count--;
                numEl.style.animation = 'none';
                void numEl.offsetWidth;
                numEl.style.animation = 'countPop 0.9s ease forwards';

                const info = countdownLabels[count] || { label: '', sublabel: '' };
                labelEl.style.animation = 'none';
                sublabelEl.style.animation = 'none';
                void labelEl.offsetWidth;
                labelEl.style.animation = 'labelFade 1s ease-in-out';
                sublabelEl.style.animation = 'labelFade 1s ease-in-out';

                numEl.textContent = count;
                labelEl.textContent = info.label;
                sublabelEl.textContent = info.sublabel;

                if (count < 1) {
                    clearInterval(interval);
                    setTimeout(revealLogo, 800);
                }
            }, 950);
        }

        function revealLogo() {
            document.getElementById('countdown-screen').classList.remove('active');
            setTimeout(() => {
                document.getElementById('logo-screen').classList.add('active');
                startBalloonShower(50);
                setTimeout(init3D, 100);
            }, 500);
        }

        // ========== LAUNCH HANDLER ==========
        document.getElementById('launch-button').addEventListener('click', () => {
            const launchScreen = document.getElementById('launch-screen');
            launchScreen.style.opacity = '0';

            setTimeout(() => {
                launchScreen.classList.remove('active');
                document.body.style.background = '#f0f4f8';
                isWhiteMode = true;
                document.getElementById('countdown-screen').classList.add('active');
                startCountdown();
            }, 900);
        });

        // ========== INITIALIZATION ==========
        window.onload = () => {
            initParallaxStars();
            initParticles(120);
            animateCanvas();
            console.log('%c🎓 25 Years Premium Launch - Parallax Stars + Ballpit Physics + 3D Image Display', 'color:#ffd700; font-size:16px; font-weight: bold;');
        };
    </script>
</body>
</html>
